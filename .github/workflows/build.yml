name: Iris-AutoBuild

on:
  schedule:
    - cron: '0 5 * * 0'  # 仅周日凌晨 5 点触发
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Upstream
        uses: actions/checkout@v4
        with:
          repository: VolmitSoftware/Iris
          ref: master
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Get Version and SHA
        id: vars
        run: |
          RAW_VERSION=$(grep "version =" build.gradle.kts | awk -F'"' '{print $2}')
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "FULL_VERSION=${RAW_VERSION}-${SHORT_SHA}" >> $GITHUB_ENV
          echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_ENV

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew jar --no-daemon

      - name: Verify and Prepare Artifact
        run: |
          cd build/libs/
          ORIGINAL_JAR=$(ls Iris-*.jar | head -n 1)
          NEW_JAR="Iris-${{ env.FULL_VERSION }}.jar"
          mv "$ORIGINAL_JAR" "$NEW_JAR"
          echo "FINAL_JAR_PATH=build/libs/$NEW_JAR" >> $GITHUB_ENV

      - name: Auto Release
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          automatic_release_tag: "build-${{ env.FULL_VERSION }}"
          prerelease: true
          title: "Iris Master Build (${{ env.FULL_VERSION }})"
          files: ${{ env.FINAL_JAR_PATH }}
