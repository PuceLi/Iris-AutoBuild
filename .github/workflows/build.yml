name: Iris-AutoBuild

on:
  schedule:
    - cron: '0 6 * * 0'  # 仅周日凌晨 6 点触发
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Upstream
        uses: actions/checkout@v6.0.2
        with:
          repository: VolmitSoftware/Iris
          ref: master
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Get Build Info
        id: vars
        run: |
          RAW_VERSION=$(grep "version =" build.gradle.kts | awk -F'"' '{print $2}')
          SHORT_SHA=$(git rev-parse --short HEAD)
          FULL_SHA=$(git rev-parse HEAD)
          BUILD_TIME=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          
          echo "FULL_VERSION=${RAW_VERSION}-${SHORT_SHA}" >> $GITHUB_ENV
          echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_ENV
          echo "FULL_SHA=${FULL_SHA}" >> $GITHUB_ENV
          echo "BUILD_TIME=${BUILD_TIME}" >> $GITHUB_ENV

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew iris --no-daemon

      - name: Verify & Prepare Artifact
        id: prepare
        run: |
          cd build/
          ORIGINAL_JAR=$(ls Iris-*.jar | head -n 1)
          NEW_JAR="Iris-${{ env.FULL_VERSION }}.jar"
          mv "$ORIGINAL_JAR" "$NEW_JAR"
          
          SHA256_SUM=$(sha256sum "$NEW_JAR" | awk '{print $1}')
          echo "SHA256_SUM=$SHA256_SUM" >> $GITHUB_ENV
          echo "FINAL_JAR_PATH=build/$NEW_JAR" >> $GITHUB_ENV
          
          cat <<EOF > ../release_note.md
          ## 构建信息
          - **上游版本:** \`${{ env.FULL_VERSION }}\`
          - **构建时间:** \`${{ env.BUILD_TIME }}\`
          - **Commit SHA:** [${{ env.FULL_SHA }}](https://github.com/VolmitSoftware/Iris/commit/${{ env.FULL_SHA }})
          
          ## 编译文件校验
          - **SHA256:** \`$SHA256_SUM\`
          EOF

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Iris-Build-${{ env.SHORT_SHA }}
          path: ${{ env.FINAL_JAR_PATH }}
          retention-days: 14

      - name: Auto Release
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          automatic_release_tag: "build-${{ env.FULL_VERSION }}"
          prerelease: false
          title: "Iris Master Build (${{ env.FULL_VERSION }})"
          files: ${{ env.FINAL_JAR_PATH }}
          bodyFile: "release_note.md"